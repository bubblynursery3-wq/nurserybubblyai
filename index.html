<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Bubbly Map Tour</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 360 Viewer -->
    <div id="viewer"></div>

    <!-- Loading Spinner -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <h1 id="location-name">Select a room on the map</h1>
    </div>

    <!-- Scroll Bar Navigation -->
    <div id="scroll-nav">
        <input type="range" id="scroll-h" class="scroll-bar horizontal" min="0" max="360" value="180" step="1">
        <input type="range" id="scroll-v" class="scroll-bar vertical" min="0" max="170" value="85" step="1">
    </div>

    <!-- Interactive Map -->
    <div id="map-container" class="minimized">
        <button id="map-toggle">
            <span class="icon">⤢</span>
            <span class="text">Map</span>
        </button>
        <div id="map-wrapper">
            <img src="map.png" id="map-img" alt="Floor Plan">
            <div id="hotspots"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
